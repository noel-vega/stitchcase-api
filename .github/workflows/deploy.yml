name: Deploy to Elastic Beanstalk

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'   # bump to '9.0.x' if you target net9.0

      - name: Publish
        run: dotnet publish ./api/api.csproj -c Release -o ./publish

      - name: Add Procfile
        run: |
          echo "web: dotnet api.dll" > ./publish/Procfile

      - name: Create deployment package
        run: cd publish && zip -r ../deploy.zip . && cd ..

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::084375572674:role/github-actions-eb
          aws-region: us-east-1

      - name: Deploy
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1
        with:
          aws-region: us-east-1
          application-name: stitchcase-api 
          environment-name: stitchcase-api-env 
          deployment-package: deploy.zip
          version-label: ${{ github.sha }}
